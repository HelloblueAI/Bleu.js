# Dependabot: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
# Keep scan scope minimal — only root pip, collaboration-tools npm, root Docker, GitHub Actions.
# backend/ is NOT in this repo (see docs/DEPENDABOT_AND_DEPENDENCIES.md).
version: 2
updates:
  # npm: collaboration-tools only
  - package-ecosystem: "npm"
    directory: "/collaboration-tools"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "helloblueai"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      production-dependencies:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "patch"
          - "minor"
      development-dependencies:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "patch"
          - "minor"

  # pip (pyproject.toml + lockfile at /)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "helloblueai"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "torch"
        # Dependabot often fails on torch (size/build); bump manually
      - dependency-name: "ray"
        # optional extra; no upstream fix yet — see SECURITY.md
    groups:
      pip-security:
        applies-to: security-updates
        patterns:
          - "*"
      python-patch-minor:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

  # Docker (root Dockerfile)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "helloblueai"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      docker-security:
        applies-to: security-updates
        patterns:
          - "*"
      docker-version:
        applies-to: version-updates
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "helloblueai"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
      actions-version:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
