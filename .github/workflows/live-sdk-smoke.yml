name: Live SDK Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: read

concurrency:
  group: live-sdk-smoke
  cancel-in-progress: false

jobs:
  pypi-sdk-smoke:
    name: PyPI SDK live API smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BLEUJS_API_KEY: ${{ secrets.BLEUJS_API_KEY || secrets.BLEUJS_PYTHON }}

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install published SDK in clean venv
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install bleu-js
          python -m pip show bleu-js

      - name: Verify imports and CLI entry points
        run: |
          . .venv-smoke/bin/activate
          python -c "import bleujs; from bleujs.api_client import BleuAPIClient; from bleujs import BleuJS; print('imports ok')"
          bleu version
          bleujs version

      - name: Exercise live API from published SDK
        run: |
          if [ -z "$BLEUJS_API_KEY" ]; then
            echo "Set BLEUJS_API_KEY or BLEUJS_PYTHON repository secret for live SDK smoke tests."
            exit 1
          fi

          . .venv-smoke/bin/activate
          python - <<'PY'
          import os
          import sys
          from bleujs.api_client import BleuAPIClient

          # Cloudflare managed challenge can return HTML to non-browser clients.
          # Keep SDK packaging/import smoke strict, but mark this known infra blocker as warning.
          challenge_markers = (
              "Just a moment...",
              "Enable JavaScript and cookies to continue",
              "challenges.cloudflare.com",
              "__cf_chl_",
          )

          client = BleuAPIClient(api_key=os.environ["BLEUJS_API_KEY"])
          try:
              print("health:", client.health())
              print("models:", client.list_models())
          except Exception as exc:
              message = str(exc)
              if any(marker in message for marker in challenge_markers):
                  print(
                      "::warning::Live API request blocked by Cloudflare managed challenge. "
                      "Configure a WAF bypass for CI/non-browser API traffic to "
                      "api.bleujs.org (/health, /api/v1/*)."
                  )
                  sys.exit(0)
              raise
          PY
