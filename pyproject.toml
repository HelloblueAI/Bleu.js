    "pandas",
    "scikit-learn",
    "xgboost",
    "qiskit",
    "qiskit-aer",
    "qiskit-algorithms",
    "pennylane",
    "torch",
    "tensorflow",
    "keras",
    "shap",
    "fastapi",
    "uvicorn",
    "starlette",
    "pydantic-settings",
    "jinja2",
    "sqlalchemy",
    "alembic",
    "psycopg2-binary",
    "boto3",
    "aiohttp",
