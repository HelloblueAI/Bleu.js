[tool.poetry.group.dev.dependencies]
pytest = "^9.0.2"
pytest-cov = ">=4,<8"
pytest-asyncio = ">=0.21,<1.4"
black = ">=25.1,<27.0"
isort = ">=5,<9"
flake8 = "^4.0.0"
mypy = ">=0.900,<1.20"
pre-commit = ">=2,<5"
ruff = ">=0.14.8,<0.16.0"
bandit = "^1.7.0"
types-pyyaml = "^6.0.12.20250516"
types-aiofiles = "^25.1.0.20251011"
virtualenv = ">=20.36.1"

[tool.poetry.scripts]
# Use package-relative path (bleujs.cli:main) so the installed script works after pip install.
# Do not use "cli:main" — that breaks with ModuleNotFoundError when the package is installed.
bleu = "bleujs.cli:main"
bleu-js = "bleujs.cli:main"
bleujs = "bleujs.cli:main"

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

# Pytest: pytest.ini at repo root is canonical (pytest uses it when both exist).
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "integration: Integration tests (external services or slow). Excluded from default CI via --ignore.",
    "asyncio: Async tests (pytest-asyncio).",
]
asyncio_mode = "auto"
addopts = [
    "--strict-markers",
    "--strict-config",
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-report=html",
    "--cov-report=xml",
]

[tool.coverage.run]
source = ["src"]
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__pycache__/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.bandit]
exclude_dirs = ["tests", "venv", ".venv"]
skips = ["B101", "B601"]

[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "B", "C4", "UP",
]
ignore = [
    "E501", "B008", "C901",
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
