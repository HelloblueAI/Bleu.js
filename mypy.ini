[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False
disallow_untyped_decorators = False
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True

# Ignore missing imports for optional dependencies
ignore_missing_imports = True
# Only check our code; don't follow into library stubs (avoids numpy stub issues)
follow_imports = skip

# Ignore specific error types that are too strict for now
disable_error_code =
    attr-defined,
    assignment,
    return-value,
    arg-type,
    call-overload,
    operator,
    index,
    misc,
    valid-type,
    var-annotated,
    abstract,
    func-returns-value,
    call-arg,
    has-type,
    no-redef,
    no-any-return,
    union-attr,
    type-var,
    unreachable,
    unused-ignore

# Exclude problematic files/directories
exclude =
    .*bleujs-env.*,
    .*venv.*,
    .*env.*,
    .*__pycache__.*,
    .*\.git.*,
    .*\.mypy_cache.*

# Per-module settings
[mypy.plugins.numpy.*]
ignore_missing_imports = True

[mypy-numpy.*]
follow_imports = skip
[mypy-numpy]
follow_imports = skip

[mypy-qiskit.*]
ignore_missing_imports = True

[mypy-cirq.*]
ignore_missing_imports = True

[mypy-aiofiles.*]
ignore_missing_imports = True
